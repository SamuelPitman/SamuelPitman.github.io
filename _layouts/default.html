<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | {{ site.title }}</title>
  <link rel="shortcut icon" href="/assets/favicon.ico">
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #fafaf8;
      --sidebar-bg: #f4f3ef;
      --border: #e2e0d8;
      --text: #1a1a18;
      --muted: #7a7870;
      --accent: #2a5298;
      --accent-hover: #1a3a78;
      --sidebar-width: 220px;
      --font-body: 'EB Garamond', Georgia, serif;
      --font-mono: 'DM Mono', 'Courier New', monospace;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      font-size: 18px;
      line-height: 1.7;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ── Layout wrapper ── */
    .layout {
      display: flex;
      flex: 1;
      min-height: 0;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: var(--sidebar-width);
      min-width: var(--sidebar-width);
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 2.5rem 1.5rem 2rem;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
    }

    .sidebar-name {
      font-family: var(--font-body);
      font-size: 1.05rem;
      font-weight: 500;
      letter-spacing: 0.01em;
      color: var(--text);
      margin-bottom: 0.2rem;
      line-height: 1.3;
    }

    .sidebar-affil {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 2rem;
    }

    .sidebar-divider {
      height: 1px;
      background: var(--border);
      margin: 1.2rem 0;
    }

    .nav-label {
      font-family: var(--font-mono);
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.6rem;
      margin-top: 0.2rem;
    }

    .sidebar nav {
      display: flex;
      flex-direction: column;
      gap: 0.1rem;
    }

    .sidebar nav a {
      font-family: var(--font-body);
      font-size: 0.95rem;
      color: var(--text);
      text-decoration: none;
      padding: 0.3rem 0.5rem;
      border-radius: 3px;
      transition: background 0.15s, color 0.15s;
      display: block;
    }

    .sidebar nav a:hover {
      background: var(--border);
      color: var(--accent);
    }

    .sidebar nav a.active {
      color: var(--accent);
      font-weight: 500;
    }

    .sidebar-spacer {
      flex: 1;
    }

    /* ── Main content ── */
    .content-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    main {
      flex: 1;
      max-width: 720px;
      width: 100%;
      padding: 3.5rem 3rem 4rem;
    }

    /* ── Typography ── */
    main h1 {
      font-size: 1.9rem;
      font-weight: 500;
      letter-spacing: -0.01em;
      margin-bottom: 0.4rem;
      line-height: 1.25;
    }

    main h2 {
      font-size: 1.3rem;
      font-weight: 500;
      margin-top: 2.5rem;
      margin-bottom: 0.8rem;
      color: var(--text);
    }

    main h3 {
      font-size: 1.1rem;
      font-weight: 500;
      margin-top: 1.8rem;
      margin-bottom: 0.5rem;
    }

    main p {
      margin-bottom: 1.1rem;
      color: var(--text);
    }

    main a {
      color: var(--accent);
      text-decoration: underline;
      text-underline-offset: 2px;
      text-decoration-thickness: 1px;
    }

    main a:hover {
      color: var(--accent-hover);
    }

    /* Paper / publication entries */
    .paper-entry {
      border-left: 2px solid var(--border);
      padding: 0.6rem 0 0.6rem 1rem;
      margin-bottom: 1.4rem;
      transition: border-color 0.15s;
    }

    .paper-entry:hover {
      border-color: var(--accent);
    }

    .paper-title {
      font-weight: 500;
      font-size: 1rem;
      margin-bottom: 0.2rem;
    }

    .paper-authors {
      font-size: 0.88rem;
      color: var(--muted);
      font-style: italic;
      margin-bottom: 0.25rem;
    }

    .paper-meta {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--muted);
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .paper-meta a {
      color: var(--accent);
      text-decoration: none;
      border: 1px solid var(--border);
      padding: 0.1rem 0.4rem;
      border-radius: 2px;
      font-size: 0.68rem;
      letter-spacing: 0.03em;
      transition: border-color 0.15s, background 0.15s;
    }

    .paper-meta a:hover {
      background: var(--border);
      border-color: var(--accent);
    }

    /* ── Footer ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 1rem 3rem;
      font-family: var(--font-mono);
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    /* ── Responsive ── */
    @media (max-width: 680px) {
      .layout {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        height: auto;
        position: static;
        padding: 1.5rem;
        border-right: none;
        border-bottom: 1px solid var(--border);
      }

      .sidebar nav {
        flex-direction: row;
        flex-wrap: wrap;
        gap: 0.3rem;
      }

      main {
        padding: 2rem 1.5rem;
      }

      footer {
        padding: 1rem 1.5rem;
      }
    }
  </style>
</head>
<body>

  <div class="layout">

    <!-- ── Sidebar ── -->
    <aside class="sidebar">
      <div class="sidebar-name">{{ site.title }}</div>
      <div class="sidebar-affil">{{ site.name }} · UNSW </div>

      <div class="nav-label">Pages</div>
      <nav>
        <a href="{{ '/' | relative_url }}">Home</a>
        <a href="{{ '/about' | relative_url }}">About</a>
        <a href="{{ '/publications' | relative_url }}">Publications</a>
        <a href="{{ '/recommended-papers' | relative_url }}">Recommended Papers</a>
      </nav>

      <div class="sidebar-spacer"></div>

      <div class="sidebar-divider"></div>

      <div class="nav-label">Contact</div>
      <nav>
        <a href="mailto:{{ site.email }}">Email</a>
        <a href="https://github.com/{{ site.github_username }}" target="_blank">GitHub</a>
        <a href="https://scholar.google.com/citations?user=u9FgTPkAAAAJ&hl=en" target="_blank">Google Scholar</a>
      </nav>
    </aside>

    <!-- ── Main + Footer ── -->
    <div class="content-wrap">
      <main>
        {{ content }}
      </main>

      <footer>
        <p>{{ page.title }} &middot; {{ site.name }}</p>
      </footer>
    </div>

  </div>

</body>
</html>
